<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="device" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#94a3b8" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="900" height="560" rx="0" fill="url(#bg)"/>
  <circle cx="760" cy="110" r="130" fill="#ffffff" opacity="0.09"/>
  <circle cx="130" cy="470" r="170" fill="#ffffff" opacity="0.07"/>
  
  <g filter="url(#shadow)">
    <rect x="190" y="150" width="520" height="310" rx="28" fill="#0f172a"/>
    <rect x="218" y="178" width="464" height="248" rx="18" fill="url(#device)"/>
    <rect x="420" y="460" width="60" height="54" fill="#cbd5e1"/>
    <rect x="340" y="505" width="220" height="28" rx="14" fill="#94a3b8"/>
  </g>
  <text x="62" y="94" fill="#ffffff" font-family="Arial, sans-serif" font-size="44" font-weight="800">Samsung Monitor</text>
  <text x="64" y="140" fill="#dbeafe" font-family="Arial, sans-serif" font-size="24" font-weight="600">27 inch Display</text>
</svg>